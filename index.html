<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu — Menu</title>
<style>
  :root { --primary:#1a0a00; --accent:#c8860a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--primary); color:#f5efe6; min-height:100vh; }
  .wrap { max-width:640px; margin:0 auto; padding:2rem 1.25rem 3rem; }
  header { text-align:center; padding:1.5rem 0 2rem; }
  .catnav { position:sticky; top:0; z-index:10; display:flex; gap:.5rem; overflow-x:auto; padding:.75rem 1.25rem; margin:0 -1.25rem 1rem; background:var(--primary); border-bottom:1px solid rgba(255,255,255,.12); scrollbar-width:none; }
  .catnav::-webkit-scrollbar { display:none; }
  .catnav a { flex:0 0 auto; padding:.35rem .8rem; border-radius:999px; font-size:.82rem; color:#f5efe6; text-decoration:none; border:1px solid rgba(255,255,255,.2); white-space:nowrap; }
  .catnav a:hover { background:var(--accent); color:var(--primary); border-color:var(--accent); }
  header img { height:72px; width:auto; object-fit:contain; margin-bottom:.75rem; }
  header .name { font-size:.8rem; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); font-weight:600; }
  header .title { font-family:Georgia,serif; font-size:2rem; margin-top:.4rem; }
  .cat { margin-top:2rem; scroll-margin-top:4rem; }
  .cat h2 { font-family:Georgia,serif; font-size:1.35rem; color:var(--accent); border-bottom:1px solid rgba(255,255,255,.15); padding-bottom:.4rem; margin-bottom:.75rem; }
  .cat ul { list-style:none; }
  .cat li { display:flex; align-items:baseline; gap:.5rem; padding:.35rem 0; font-size:1rem; }
  .cat .n { white-space:nowrap; }
  .cat .dots { flex:1; border-bottom:1px dotted rgba(255,255,255,.3); transform:translateY(-3px); }
  .cat .p { white-space:nowrap; font-variant-numeric:tabular-nums; color:#f5efe6; font-weight:600; }
  footer { text-align:center; margin-top:3rem; font-size:.72rem; color:rgba(245,239,230,.5); }
  footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      
      <div class="name">Menu</div>
      <div class="title">Menu</div>
    </header>
    
    <p style="text-align:center;opacity:.6">Menu bientôt disponible.</p>
    <footer>Built by <a href="https://pykero.com" target="_blank" rel="noopener">pykero.com</a></footer>
  </div>
</body>
</html>
